kind = "web"
previewPath = "/"
title = "PeptideX — Premium Biotech"
version = "1.0.0"
id = "artifacts/peptides-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25009

[services.development]
run = "pnpm --filter @workspace/peptides-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/peptides-site", "run", "build" ]
publicDir = "artifacts/peptides-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25009"
BASE_PATH = "/"
